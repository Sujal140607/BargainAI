version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: bargainai-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: bargainai-redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: bargainai-server
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: bargainai-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo-data: